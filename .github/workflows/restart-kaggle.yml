name: Restart Kaggle Backend

on:
  schedule:
    # Runs daily at 6:00 PM IST (12:30 PM UTC)
    - cron: '30 12 * * *'
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions UI

jobs:
  restart-kaggle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Kaggle CLI
        run: pip install kaggle

      - name: Configure Kaggle credentials
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          mkdir -p ~/.kaggle
          echo "{\"username\":\"${KAGGLE_USERNAME}\",\"key\":\"${KAGGLE_KEY}\"}" > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      - name: Cancel any existing Kaggle session
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          echo "Checking for existing running sessions..."
          STATUS=$(kaggle kernels status bavish11/ghost-face 2>&1 || true)
          echo "Current status: $STATUS"
          if echo "$STATUS" | grep -qi "running"; then
            echo "Found running session — pushing new version will cancel it."
          else
            echo "No active session found."
          fi

      - name: Push and run Kaggle notebook
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          echo "Pushing notebook to Kaggle (T4 GPU, 5h runtime)..."
          kaggle kernels push -p kaggle/
          echo "Notebook pushed. Kaggle will start a new T4 GPU session."

      - name: Verify kernel started
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          echo "Waiting 60s for Kaggle to register the run..."
          sleep 60
          kaggle kernels status bavish11/ghost-face || echo "Status check completed"
