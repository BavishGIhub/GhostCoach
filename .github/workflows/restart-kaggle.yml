name: Restart Kaggle Backend

on:
  schedule:
    # Runs daily at 5:00 PM IST (11:30 AM UTC)
    - cron: '30 11 * * *'
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions UI

jobs:
  restart-kaggle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Kaggle CLI
        run: pip install kaggle

      - name: Configure Kaggle credentials
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          mkdir -p ~/.kaggle
          echo "{\"username\":\"${KAGGLE_USERNAME}\",\"key\":\"${KAGGLE_KEY}\"}" > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      - name: Cancel any existing Kaggle session
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          echo "Checking for existing running sessions..."
          STATUS=$(kaggle kernels status bavish11/ghost-face 2>&1 || true)
          echo "Current status: $STATUS"
          if echo "$STATUS" | grep -qi "running"; then
            echo "Found running session — pushing new version will cancel it."
          else
            echo "No active session found."
          fi

      - name: Push and run Kaggle notebook (T4 x2)
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          echo "Pushing notebook to Kaggle (T4 x2 GPU, 5h runtime)..."
          # Force new version by pushing with -r flag
          kaggle kernels push -p kaggle/ -r
          echo "Notebook pushed with new version. Kaggle will start a new T4 x2 GPU session."

      - name: Verify kernel started
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          echo "Waiting 90s for Kaggle to register the run..."
          sleep 90
          STATUS=$(kaggle kernels status bavish11/ghost-face 2>&1 || true)
          echo "Kernel status: $STATUS"
          if echo "$STATUS" | grep -qi "running"; then
            echo "Kernel is running successfully"
          else
            echo "Kernel status check completed"
          fi
